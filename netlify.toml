[build]
  command = "pnpm run build"
  publish = "docs/.vitepress/dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
  LANG = "zh_CN.UTF-8"
  LC_ALL = "zh_CN.UTF-8"
  LC_CTYPE = "zh_CN.UTF-8"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
